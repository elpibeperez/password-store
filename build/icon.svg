<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="hl" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Highlight overlay -->
  <rect width="512" height="512" rx="112" fill="url(#hl)"/>
  
  <!-- Key icon -->
  <g transform="translate(256, 256)" fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
    <!-- Key bow (circle with hole) -->
    <circle cx="-60" cy="-40" r="60" stroke-width="28"/>
    <circle cx="-60" cy="-40" r="24" stroke-width="0" fill="#1d4ed8"/>
    
    <!-- Key shaft -->
    <line x1="0" y1="-40" x2="160" y2="-40" stroke-width="24"/>
    
    <!-- Key teeth -->
    <line x1="100" y1="-16" x2="100" y2="30" stroke-width="24" stroke-linecap="square"/>
    <line x1="140" y1="-16" x2="140" y2="50" stroke-width="24" stroke-linecap="square"/>
    
    <!-- Bottom line on shaft -->
    <line x1="0" y1="-16" x2="80" y2="-16" stroke-width="24"/>
  </g>
</svg>
